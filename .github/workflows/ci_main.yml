name: CI

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  build:
    # 4 cpu, 16G ram
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: dev
    outputs:
      publish-version: ${{ steps.project-version.outputs.publish-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java and Gradle
        id: setup-java-gradle
        uses: ConsenSys/github-actions/java-setup-gradle@main

      - name: Determine Web3Signer version
        id: project-version
        uses: ConsenSys/github-actions/java-get-project-version@main

      # v3
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        if: (github.ref == 'refs/heads/master' && github.event_name != 'pull_request') || startsWith(github.ref, 'refs/tags/')
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and Test
        id: build-test
        uses: ./.github/actions/build-test
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_INVALID_KEY_VAULT_NAME: ${{ secrets.AZURE_INVALID_KEY_VAULT_NAME }}
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        with:
          disable-test: 'false'

      - name: Create zip and tar distributions
        run: ./gradlew distTar distZip

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: distribution
          path: build/distributions/
          retention-days: 1
          if-no-files-found: error

  docker:
    runs-on: ubuntu-24.04
    needs: build
    environment: docker
    strategy:
      fail-fast: false
      matrix:
        variant: [default, distroless]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # v4.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: actions/download-artifact@v8
        with:
          name: distribution
          path: build/distributions/

      - name: Docker Metadata
        id: docker-metadata
        env:
          VARIANT: ${{ matrix.variant }}
          PUBLISH_VERSION: ${{ needs.build.outputs.publish-version }}
        run: |
          # Resolve variant-specific settings
          if [ "$VARIANT" = "distroless" ]; then
            DOCKERFILE="docker/Dockerfile.distroless"
            SUFFIX="-distroless"
          else
            DOCKERFILE="docker/Dockerfile"
            SUFFIX=""
          fi
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "tag-suffix=$SUFFIX" >> $GITHUB_OUTPUT
          echo "test-tag=consensys/web3signer:test${SUFFIX}" >> $GITHUB_OUTPUT

          # Calculate Docker Tags
          TAGS="consensys/web3signer:${PUBLISH_VERSION}${SUFFIX}"
          if [ "$PUBLISH_VERSION" != "develop" ]; then
            TAGS="$TAGS,consensys/web3signer:latest${SUFFIX}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

          # Determine Push Flag
          if [ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
          else
            echo "push=true" >> $GITHUB_OUTPUT
          fi

          # Set Build Args
          echo "build-date=$(date --utc --rfc-3339=seconds)" >> $GITHUB_OUTPUT
          echo "vcs-ref=${{ github.sha }}" >> $GITHUB_OUTPUT

      # v7.0.0
      - name: Build and export to docker
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          file: ${{ steps.docker-metadata.outputs.dockerfile }}
          context: .
          build-args: |
            TAR_FILE=./build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz
            BUILD_DATE=${{ steps.docker-metadata.outputs.build-date }}
            VCS_REF=${{ steps.docker-metadata.outputs.vcs-ref }}
            VERSION=${{ needs.build.outputs.publish-version }}
          no-cache: true
          load: true
          pull: true
          tags: ${{ steps.docker-metadata.outputs.test-tag }}

      - name: Get absolute path of reports directory
        id: get-reports-dir
        run: echo "path=$(realpath ./build/reports)" >> $GITHUB_OUTPUT

      - name: Run Docker tests (default variant)
        if: matrix.variant == 'default'
        run: ./docker/test.sh '${{ steps.docker-metadata.outputs.test-tag }}' '${{ steps.get-reports-dir.outputs.path }}'

      - name: Run Docker smoke test (distroless variant)
        if: matrix.variant == 'distroless'
        run: ./docker/test-distroless.sh '${{ steps.docker-metadata.outputs.test-tag }}' '${{ steps.get-reports-dir.outputs.path }}'

      - name: Test Summary
        if: always()
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          if [ "$VARIANT" = "distroless" ]; then
            REPORT_FILE="./build/reports/smoke-report.txt"
          else
            REPORT_FILE="./build/reports/goss-report.txt"
          fi
          SUMMARY_CONTENT="<h2>Docker Test Summary (${VARIANT})</h2>\n"
          SUMMARY_CONTENT+="<details><summary><strong>Details</strong></summary>\n"
          SUMMARY_CONTENT+="<pre><code>\n"
          if [ -f "$REPORT_FILE" ]; then
            SUMMARY_CONTENT+=$(cat "$REPORT_FILE")
          else
            SUMMARY_CONTENT+="(no report produced)"
          fi
          SUMMARY_CONTENT+="\n</code></pre></details>\n"
          echo -e "$SUMMARY_CONTENT" >> $GITHUB_STEP_SUMMARY

      # v4.0.0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        if: steps.docker-metadata.outputs.push == 'true'
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # v7.0.0
      - name: Build and push to registry
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          platforms: linux/amd64,linux/arm64
          file: ${{ steps.docker-metadata.outputs.dockerfile }}
          context: .
          build-args: |
            TAR_FILE=./build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz
            BUILD_DATE=${{ steps.docker-metadata.outputs.build-date }}
            VCS_REF=${{ steps.docker-metadata.outputs.vcs-ref }}
            VERSION=${{ needs.build.outputs.publish-version }}
          push: ${{ steps.docker-metadata.outputs.push }}
          no-cache: true
          pull: true
          tags: ${{ steps.docker-metadata.outputs.tags }}

  release:
    runs-on: ubuntu-24.04
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/')
    environment: release
    permissions:
        contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v8
        with:
          name: distribution
          path: build/distributions/

      - name: Generate Checksum
        working-directory: ./build/distributions
        run: |
          shasum -a 256 "web3signer-${{ needs.build.outputs.publish-version }}.tar.gz" > "web3signer-${{ needs.build.outputs.publish-version }}.tar.gz.sha256"
          shasum -a 256 "web3signer-${{ needs.build.outputs.publish-version }}.zip" > "web3signer-${{ needs.build.outputs.publish-version }}.zip.sha256"

      - name: Determine Prerelease
        id: determine-prerelease
        run: |
          if [[ "${{ needs.build.outputs.publish-version }}" == *-RC* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract Changelog
        id: extract-changelog
        run: |
          # Extract everything between the first ## and second ##
          CHANGELOG=$(awk '
            /^## / {
              if (count == 0) {
                count++
                next
              }
              if (count == 1) {
                exit
              }
            }
            count == 1 {print}
          ' CHANGELOG.md)
          
          # Save to file to preserve formatting
          echo "$CHANGELOG" > /tmp/changelog.txt
          
          # Also save to output (escaped for GitHub Actions)
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Get Previous Tag
        id: previous-tag
        run: |
          # Extract the version from the second ## header in CHANGELOG.md
          PREVIOUS_TAG=$(awk '
            /^## / {
              count++
              if (count == 2) {
                # Remove "## " prefix and any trailing whitespace
                gsub(/^## /, "")
                gsub(/[[:space:]]*$/, "")
                print
                exit
              }
            }
          ' CHANGELOG.md)
          
          # If no previous tag found in changelog, fall back to git
          if [ -z "$PREVIOUS_TAG" ]; then
            CURRENT_TAG="${{ needs.build.outputs.publish-version }}"
            PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -n1)
          
            # If still nothing, use first commit
            if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" == "$CURRENT_TAG" ]; then
              PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
            fi
          fi
          
          echo "previous-tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Build Release Body
        id: build-release-body
        run: |
          TAG="${{ needs.build.outputs.publish-version }}"
          PREV_TAG="${{ steps.previous-tag.outputs.previous-tag }}"
          
          # Build the release body
          {
            echo 'body<<EOF'
            cat /tmp/changelog.txt
            echo ""
            echo "## Downloads"
            echo "### Binaries"
            echo "|      Binary     |                       Checksum                      |"
            echo "|:-----------------:|:----------------------------------------------------------------:|"
            echo "| [web3signer.tar.gz](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.tar.gz) | [Checksum](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.tar.gz.sha256)|"
            echo "| [web3signer.zip](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.zip)    | [Checksum](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.zip.sha256) |"
            echo ""
            echo "### Docker"
            echo "Default image (Ubuntu + Eclipse Temurin JRE 25):"
            echo "\`docker pull consensys/web3signer:${TAG}\`"
            echo ""
            echo "Hardened image (Google Distroless, read-only-filesystem compatible):"
            echo "\`docker pull consensys/web3signer:${TAG}-distroless\`"
            echo ""
            echo "---"
            echo "**Full Changelog**: https://github.com/Consensys/web3signer/compare/${PREV_TAG}...${TAG}"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # Create release tag and attach the distribution
      # v2.6.1
      - name: Web3Signer Release
        id: release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: |
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz.sha256
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.zip
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.zip.sha256

          tag_name: ${{ needs.build.outputs.publish-version }}
          body: ${{ steps.build-release-body.outputs.body }}
          draft: true
          prerelease: ${{ steps.determine-prerelease.outputs.prerelease }}
          make_latest: ${{ steps.determine-prerelease.outputs.prerelease == 'false' }}
          preserve_order: true
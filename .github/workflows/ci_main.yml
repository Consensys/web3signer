name: CI

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  build:
    # 4 cpu, 16G ram
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: dev
    outputs:
      publish-version: ${{ steps.project-version.outputs.publish-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: 'recursive'
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java and Gradle
        id: setup-java-gradle
        uses: ConsenSys/github-actions/java-setup-gradle@b7f698d0ad4db965700c920de5a2c243f0ce0f8c # main

      - name: Determine Web3Signer version
        id: project-version
        uses: ConsenSys/github-actions/java-get-project-version@b7f698d0ad4db965700c920de5a2c243f0ce0f8c # main

      # v3
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        if: (github.ref == 'refs/heads/master' && github.event_name != 'pull_request') || startsWith(github.ref, 'refs/tags/')
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and Test
        id: build-test
        uses: ./.github/actions/build-test
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_INVALID_KEY_VAULT_NAME: ${{ secrets.AZURE_INVALID_KEY_VAULT_NAME }}
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        with:
          disable-test: 'false'

      - name: Create zip and tar distributions
        run: ./gradlew distTar distZip

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: distribution
          path: build/distributions/
          retention-days: 1
          if-no-files-found: error

  docker-build:
    name: docker-build (${{ matrix.variant }}, ${{ matrix.platform.arch }})
    needs: build
    environment: docker
    strategy:
      fail-fast: false
      matrix:
        variant: [default, distroless]
        platform:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: distribution
          path: build/distributions/

      - name: Docker Metadata
        id: docker-metadata
        env:
          VARIANT: ${{ matrix.variant }}
          PUBLISH_VERSION: ${{ needs.build.outputs.publish-version }}
        run: |
          # Resolve variant-specific settings
          if [ "$VARIANT" = "distroless" ]; then
            DOCKERFILE="docker/Dockerfile.distroless"
            SUFFIX="-distroless"
          else
            DOCKERFILE="docker/Dockerfile"
            SUFFIX=""
          fi
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "tag-suffix=$SUFFIX" >> $GITHUB_OUTPUT
          echo "image-name=consensys/web3signer" >> $GITHUB_OUTPUT
          echo "test-tag=consensys/web3signer:test${SUFFIX}" >> $GITHUB_OUTPUT

          # Push only on push to master or annotated tags. The workflow `on:`
          # filter already blocks side-branch pushes, but making the gate
          # explicit here is belt-and-braces against future trigger changes.
          if [ "${{ github.event_name }}" = "push" ] \
             && { [ "${{ github.ref }}" = "refs/heads/master" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; }; then
            echo "push=true" >> $GITHUB_OUTPUT
          else
            echo "push=false" >> $GITHUB_OUTPUT
          fi

          # Set Build Args
          echo "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "vcs-ref=${{ github.sha }}" >> $GITHUB_OUTPUT

      # v7.0.0
      - name: Build and export to docker (smoke-test image)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          file: ${{ steps.docker-metadata.outputs.dockerfile }}
          context: .
          platforms: linux/${{ matrix.platform.arch }}
          build-args: |
            TAR_FILE=./build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz
            BUILD_DATE=${{ steps.docker-metadata.outputs.build-date }}
            VCS_REF=${{ steps.docker-metadata.outputs.vcs-ref }}
            VERSION=${{ needs.build.outputs.publish-version }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.platform.arch }}
          load: true
          pull: true
          tags: ${{ steps.docker-metadata.outputs.test-tag }}

      - name: Get absolute path of reports directory
        id: get-reports-dir
        run: echo "path=$(realpath ./build/reports)" >> $GITHUB_OUTPUT

      - name: Run Docker tests (default variant)
        if: matrix.variant == 'default'
        run: ./docker/test.sh '${{ steps.docker-metadata.outputs.test-tag }}' '${{ steps.get-reports-dir.outputs.path }}'

      - name: Run Docker smoke test (distroless variant)
        if: matrix.variant == 'distroless'
        run: ./docker/test-distroless.sh '${{ steps.docker-metadata.outputs.test-tag }}' '${{ steps.get-reports-dir.outputs.path }}'

      - name: Test Summary
        if: always()
        env:
          VARIANT: ${{ matrix.variant }}
          ARCH: ${{ matrix.platform.arch }}
        run: |
          if [ "$VARIANT" = "distroless" ]; then
            REPORT_FILE="./build/reports/smoke-report.txt"
          else
            REPORT_FILE="./build/reports/goss-report.txt"
          fi
          SUMMARY_CONTENT="<h2>Docker Test Summary (${VARIANT} / linux-${ARCH})</h2>\n"
          SUMMARY_CONTENT+="<details><summary><strong>Details</strong></summary>\n"
          SUMMARY_CONTENT+="<pre><code>\n"
          if [ -f "$REPORT_FILE" ]; then
            SUMMARY_CONTENT+=$(cat "$REPORT_FILE")
          else
            SUMMARY_CONTENT+="(no report produced)"
          fi
          SUMMARY_CONTENT+="\n</code></pre></details>\n"
          echo -e "$SUMMARY_CONTENT" >> $GITHUB_STEP_SUMMARY

      # v4.0.0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        if: steps.docker-metadata.outputs.push == 'true'
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # v7.0.0
      - name: Build and push by digest
        id: push
        if: steps.docker-metadata.outputs.push == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          file: ${{ steps.docker-metadata.outputs.dockerfile }}
          context: .
          platforms: linux/${{ matrix.platform.arch }}
          build-args: |
            TAR_FILE=./build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz
            BUILD_DATE=${{ steps.docker-metadata.outputs.build-date }}
            VCS_REF=${{ steps.docker-metadata.outputs.vcs-ref }}
            VERSION=${{ needs.build.outputs.publish-version }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.platform.arch }}
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ steps.docker-metadata.outputs.image-name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        if: steps.docker-metadata.outputs.push == 'true'
        run: |
          mkdir -p "${{ runner.temp }}/digests/${{ matrix.variant }}"
          digest="${{ steps.push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${{ matrix.variant }}/${digest#sha256:}"

      - name: Upload digest
        if: steps.docker-metadata.outputs.push == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/${{ matrix.variant }}/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: docker-merge (${{ matrix.variant }})
    needs: [build, docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    environment: docker
    permissions:
      contents: read
      id-token: write   # keyless cosign via GitHub OIDC
    strategy:
      fail-fast: false
      matrix:
        variant: [default, distroless]
    runs-on: ubuntu-24.04
    steps:
      - name: Docker Metadata
        id: docker-metadata
        env:
          VARIANT: ${{ matrix.variant }}
          PUBLISH_VERSION: ${{ needs.build.outputs.publish-version }}
        run: |
          if [ "$VARIANT" = "distroless" ]; then
            SUFFIX="-distroless"
          else
            SUFFIX=""
          fi
          IMAGE_NAME="consensys/web3signer"
          echo "image-name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "tag-suffix=$SUFFIX" >> $GITHUB_OUTPUT

          PRIMARY_TAG="${IMAGE_NAME}:${PUBLISH_VERSION}${SUFFIX}"
          TAGS="$PRIMARY_TAG"
          if [ "$PUBLISH_VERSION" != "develop" ]; then
            TAGS="$TAGS,${IMAGE_NAME}:latest${SUFFIX}"
          fi
          echo "primary-tag=$PRIMARY_TAG" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Download per-arch digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digests-${{ matrix.variant }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      # v4.0.0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Create manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ steps.docker-metadata.outputs.image-name }}
          TAGS: ${{ steps.docker-metadata.outputs.tags }}
        run: |
          TAG_ARGS=""
          IFS=',' read -ra TAG_ARR <<< "$TAGS"
          for t in "${TAG_ARR[@]}"; do TAG_ARGS+=" -t $t"; done
          # shellcheck disable=SC2046
          docker buildx imagetools create $TAG_ARGS \
            $(printf "${IMAGE_NAME}@sha256:%s " *)

      - name: Inspect manifest
        env:
          PRIMARY_TAG: ${{ steps.docker-metadata.outputs.primary-tag }}
        run: docker buildx imagetools inspect "$PRIMARY_TAG"

      - name: Capture manifest-list digest
        id: manifest
        env:
          PRIMARY_TAG: ${{ steps.docker-metadata.outputs.primary-tag }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "$PRIMARY_TAG" --format '{{json .Manifest.Digest}}' | jq -r .)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22

      - name: Sign manifest with keyless cosign (Sigstore OIDC)
        env:
          IMAGE_NAME: ${{ steps.docker-metadata.outputs.image-name }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"

  release:
    runs-on: ubuntu-24.04
    needs: [build, docker-merge]
    if: startsWith(github.ref, 'refs/tags/')
    environment: release
    permissions:
        contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: distribution
          path: build/distributions/

      - name: Generate Checksum
        working-directory: ./build/distributions
        run: |
          shasum -a 256 "web3signer-${{ needs.build.outputs.publish-version }}.tar.gz" > "web3signer-${{ needs.build.outputs.publish-version }}.tar.gz.sha256"
          shasum -a 256 "web3signer-${{ needs.build.outputs.publish-version }}.zip" > "web3signer-${{ needs.build.outputs.publish-version }}.zip.sha256"

      - name: Determine Prerelease
        id: determine-prerelease
        run: |
          if [[ "${{ needs.build.outputs.publish-version }}" == *-RC* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract Changelog
        id: extract-changelog
        run: |
          # Extract everything between the first ## and second ##
          CHANGELOG=$(awk '
            /^## / {
              if (count == 0) {
                count++
                next
              }
              if (count == 1) {
                exit
              }
            }
            count == 1 {print}
          ' CHANGELOG.md)
          
          # Save to file to preserve formatting
          echo "$CHANGELOG" > /tmp/changelog.txt
          
          # Also save to output (escaped for GitHub Actions)
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Get Previous Tag
        id: previous-tag
        run: |
          # Extract the version from the second ## header in CHANGELOG.md
          PREVIOUS_TAG=$(awk '
            /^## / {
              count++
              if (count == 2) {
                # Remove "## " prefix and any trailing whitespace
                gsub(/^## /, "")
                gsub(/[[:space:]]*$/, "")
                print
                exit
              }
            }
          ' CHANGELOG.md)
          
          # If no previous tag found in changelog, fall back to git
          if [ -z "$PREVIOUS_TAG" ]; then
            CURRENT_TAG="${{ needs.build.outputs.publish-version }}"
            PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -n1)
          
            # If still nothing, use first commit
            if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" == "$CURRENT_TAG" ]; then
              PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
            fi
          fi
          
          echo "previous-tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Build Release Body
        id: build-release-body
        run: |
          TAG="${{ needs.build.outputs.publish-version }}"
          PREV_TAG="${{ steps.previous-tag.outputs.previous-tag }}"
          
          # Build the release body
          {
            echo 'body<<EOF'
            cat /tmp/changelog.txt
            echo ""
            echo "## Downloads"
            echo "### Binaries"
            echo "|      Binary     |                       Checksum                      |"
            echo "|:-----------------:|:----------------------------------------------------------------:|"
            echo "| [web3signer.tar.gz](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.tar.gz) | [Checksum](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.tar.gz.sha256)|"
            echo "| [web3signer.zip](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.zip)    | [Checksum](https://github.com/Consensys/web3signer/releases/download/${TAG}/web3signer-${TAG}.zip.sha256) |"
            echo ""
            echo "### Docker"
            echo "Default image (Ubuntu + Eclipse Temurin JRE 25):"
            echo "\`docker pull consensys/web3signer:${TAG}\`"
            echo ""
            echo "Hardened image (Google Distroless, read-only-filesystem compatible):"
            echo "\`docker pull consensys/web3signer:${TAG}-distroless\`"
            echo ""
            echo "---"
            echo "**Full Changelog**: https://github.com/Consensys/web3signer/compare/${PREV_TAG}...${TAG}"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # Create release tag and attach the distribution
      # v2.6.1
      - name: Web3Signer Release
        id: release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: |
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.tar.gz.sha256
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.zip
            build/distributions/web3signer-${{ needs.build.outputs.publish-version }}.zip.sha256

          tag_name: ${{ needs.build.outputs.publish-version }}
          body: ${{ steps.build-release-body.outputs.body }}
          draft: true
          prerelease: ${{ steps.determine-prerelease.outputs.prerelease }}
          make_latest: ${{ steps.determine-prerelease.outputs.prerelease == 'false' }}
          preserve_order: true